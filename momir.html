<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1a1209">
<title>Printoken — Momir Basic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body data-page="momir">
<header>
  <a class="logo" href="index.html"><h1>Printoken</h1></a>
  <p class="tag">Print MTG tokens.</p>
  <nav class="page-nav">
    <a href="index.html" class="ghost">Search</a>
    <a href="create.html" class="ghost">Create token</a>
  </nav>
</header>

<main>
  <section id="view-momir">

    <div id="momir-pane">
      <p class="momir-intro">Pick a mana value. Get a random creature.</p>
      <div class="momir-controls">
        <div class="momir-cmc-row">
          <button type="button" id="momir-dec" class="ghost" aria-label="Decrease mana value">−</button>
          <span id="momir-cmc-val" class="momir-cmc-val" aria-live="polite">0</span>
          <button type="button" id="momir-inc" class="ghost" aria-label="Increase mana value">+</button>
        </div>
        <button type="button" id="momir-roll">Roll</button>
      </div>
      <div id="momir-status" class="search-status" aria-live="polite"></div>
    </div>

    <div id="momir-preview" hidden>
      <div class="preview-bar">
        <span id="momir-card-name"></span>
      </div>

      <div id="momir-canvases"></div>

      <fieldset class="output">
        <legend>Output</legend>
        <label>Paper width
          <select name="momir-paper">
            <option value="53">53 mm (Phomemo)</option>
            <option value="80">80 mm</option>
            <option value="custom-mtg">63 mm (standard MTG)</option>
          </select>
        </label>
        <label>DPI
          <select name="momir-dpi">
            <option value="203" selected>203 (thermal)</option>
            <option value="300">300</option>
          </select>
        </label>
      </fieldset>

      <details class="advanced">
        <summary>Advanced</summary>
        <div class="advanced-grid">
          <label>Style
            <select name="momir-algo">
              <option value="none" selected>None — let the printer dither</option>
              <option value="atkinson">Crisp (Atkinson)</option>
              <option value="floyd">Detailed (Floyd–Steinberg)</option>
              <option value="threshold">Stark (threshold only)</option>
            </select>
          </label>
          <label>Density
            <input type="range" name="momir-density" min="0" max="100" value="50">
            <output for="momir-density" id="momir-density-out">50</output>
          </label>
          <label class="inline">
            <input type="checkbox" name="momir-sharpen"> Sharpen
          </label>
        </div>
      </details>
    </div>

  </section>
</main>

<script src="utils.js" defer></script>
<script src="momir.js" defer></script>
</body>
</html>
